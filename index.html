<!DOCTYPE html>
<html lang="uz-Cyrl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Smart-AZS Сканер</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --brand: #4a0efd;
            --brand-2: #6b3cff;
            --brand-soft: rgba(74, 14, 253, 0.18);
            --bg: #090910;
            --card: #141420;
            --card-2: #1a1a29;
            --line: rgba(255,255,255,0.08);
            --text: #ffffff;
            --muted: #a6a6b3;
            --success: #32d74b;
            --danger: #ff453a;
            --warning: #ff9f0a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 14px;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(74,14,253,0.24), transparent 35%),
                linear-gradient(180deg, #07070d 0%, #0c0c15 100%);
        }

        .topbar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: var(--brand);
            box-shadow: 0 0 18px rgba(74, 14, 253, 0.9);
        }

        .topbar-title {
            font-size: 1.06rem;
            font-weight: 800;
            letter-spacing: 0.2px;
        }

        .app-card {
            background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.45);
        }

        .section-title {
            font-size: 0.88rem;
            color: var(--muted);
            text-align: center;
            margin-bottom: 10px;
        }

        #reader {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* html5-qrcode ортиқча элементларини яшириш */
        #reader__dashboard,
        #reader span,
        #reader button {
            display: none !important;
        }

        #reader__camera_selection {
            display: none !important;
        }

        .status-card {
            margin-top: 16px;
            min-height: 130px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03);
            padding: 14px;
            text-align: center;
        }

        #car-name {
            color: var(--muted);
            font-size: 1rem;
        }

        .car-info {
            color: var(--success);
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .plate-info {
            font-size: 0.98rem;
            color: #ececf6;
            margin-bottom: 12px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .meta-item {
            text-align: left;
            padding: 10px 12px;
            border-radius: 14px;
            border: 1px solid rgba(74, 14, 253, 0.2);
            background: rgba(74, 14, 253, 0.08);
        }

        .meta-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 3px;
        }

        .meta-value {
            font-size: 0.98rem;
            font-weight: 700;
            color: #fff;
            word-break: break-word;
        }

        .controls-card {
            margin-top: 16px;
            padding: 14px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03);
        }

        .block-title {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 10px;
            text-align: center;
        }

        .fuel-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .fuel-btn {
            border: 1px solid rgba(255,255,255,0.07);
            background: #11111c;
            color: white;
            padding: 14px 8px;
            border-radius: 16px;
            font-size: 0.96rem;
            font-weight: 800;
            transition: 0.2s ease;
        }

        .fuel-btn.active {
            border-color: var(--brand);
            background: linear-gradient(135deg, rgba(74,14,253,0.28), rgba(107,60,255,0.18));
            box-shadow: 0 0 0 2px rgba(74,14,253,0.16);
        }

        .input-wrap {
            margin-top: 6px;
        }

        input {
            width: 100%;
            background: #10101a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: white;
            padding: 16px;
            box-sizing: border-box;
            font-size: 1.08rem;
            text-align: center;
            outline: none;
            transition: 0.2s ease;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px var(--brand-soft);
        }

        .calc-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.92rem;
            margin-bottom: 6px;
            color: var(--muted);
        }

        .calc-row strong {
            color: white;
            font-weight: 800;
        }

        .calc-row:last-child {
            margin-bottom: 0;
        }

        #send-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 17px;
            font-size: 1rem;
            font-weight: 800;
            margin-top: 14px;
            transition: 0.25s ease;
            opacity: 0.35;
            transform: scale(1);
            box-shadow: 0 10px 24px rgba(74, 14, 253, 0.28);
        }

        #send-btn.active {
            opacity: 1;
            transform: scale(1.01);
        }

        #send-btn:disabled {
            cursor: not-allowed;
        }

        .helper-text {
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--muted);
            text-align: center;
        }

        .footer {
            margin-top: 14px;
            text-align: center;
            font-size: 0.76rem;
            color: rgba(255,255,255,0.45);
        }

        .error-text {
            color: var(--danger);
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="dot"></div>
        <div class="topbar-title">Smart-AZS Сканер</div>
    </div>

    <div class="app-card">
        <div class="section-title">QR-кодни камерага тўғри тутинг</div>
        <div id="reader"></div>

        <div class="status-card">
            <div id="car-name">QR-кодни сканер қилинг</div>
            <div id="car-details"></div>
        </div>

        <div class="controls-card">
            <div class="block-title">Ёқилғи турини танланг</div>

            <div class="fuel-grid">
                <button class="fuel-btn" data-fuel="АИ-95" onclick="selectFuel('АИ-95')">АИ-95</button>
                <button class="fuel-btn" data-fuel="АИ-92" onclick="selectFuel('АИ-92')">АИ-92</button>
                <button class="fuel-btn" data-fuel="ДТ" onclick="selectFuel('ДТ')">ДТ</button>
            </div>

            <div class="input-wrap">
                <input
                    type="number"
                    id="fuel-amount"
                    placeholder="Неча литр?"
                    inputmode="decimal"
                    min="0"
                    step="0.1"
                />
            </div>

            <div class="calc-box" id="calc-box">
                <div class="calc-row">
                    <span>Ёқилғи:</span>
                    <strong id="calc-fuel">Танланмаган</strong>
                </div>
                <div class="calc-row">
                    <span>Нарх:</span>
                    <strong id="calc-price">Номаълум</strong>
                </div>
                <div class="calc-row">
                    <span>Литр:</span>
                    <strong id="calc-liters">0</strong>
                </div>
                <div class="calc-row">
                    <span>Жами:</span>
                    <strong id="calc-total">Номаълум</strong>
                </div>
            </div>

            <button id="send-btn" onclick="sendData()" disabled>ТАСДИҚЛАШ</button>
            <div class="helper-text">Аввал транспортни сканер қилинг, кейин ёқилғи турини танлаб литр киритинг.</div>
        </div>

        <div class="footer">Powered by Smart-AZS</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let scannedId = null;
    let selectedFuel = null;
    let scannedVehicle = null;

    // Бу ерга ўз Apps Script URL манзилингни қўй
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyr7T5-1enBqiU0_WwDvsQAl77ZhB-cQKkLJIrWemYq8zmFH4PD6qDPGBNHg46lKwMhIQ/exec";

    const carNameEl = document.getElementById("car-name");
    const carDetailsEl = document.getElementById("car-details");
    const sendBtn = document.getElementById("send-btn");
    const litersInput = document.getElementById("fuel-amount");

    const calcFuel = document.getElementById("calc-fuel");
    const calcPrice = document.getElementById("calc-price");
    const calcLiters = document.getElementById("calc-liters");
    const calcTotal = document.getElementById("calc-total");

    function formatMoney(v) {
        const num = Number(v || 0);
        if (!isFinite(num)) return "Номаълум";
        return num.toLocaleString("ru-RU") + " сўм";
    }

    function formatLiters(v) {
        const num = Number(v || 0);
        if (!isFinite(num)) return "0";
        return num.toLocaleString("ru-RU") + " л";
    }

    function setIdleState() {
        scannedVehicle = null;
        scannedId = null;
        selectedFuel = null;

        carNameEl.innerText = "QR-кодни сканер қилинг";
        carDetailsEl.innerHTML = "";

        document.querySelectorAll(".fuel-btn").forEach(btn => btn.classList.remove("active"));
        litersInput.value = "";

        updateCalc();
        updateSendButton();
    }

    function setLoadingState() {
        scannedVehicle = null;
        carNameEl.innerText = "⚡ Текширилмоқда...";
        carDetailsEl.innerHTML = "";
        updateCalc();
        updateSendButton();
    }

    function renderVehicleInfo(data) {
        scannedVehicle = data;

        const brand = data.brand || "Транспорт";
        const plate = data.plate || data.number || "Рақам кўрсатилмаган";
        const company = data.company || data.company_name || "Кўрсатилмаган";
        const limitValue = data.limit || "Номаълум";

        carNameEl.innerHTML = `
            <div class="car-info">${brand}</div>
            <div class="plate-info">${plate}</div>
        `;

        carDetailsEl.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Фирма</div>
                    <div class="meta-value">${company}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Лимит</div>
                    <div class="meta-value">${limitValue}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Транспорт ID</div>
                    <div class="meta-value">${data.id || scannedId || "Номаълум"}</div>
                </div>
            </div>
        `;

        updateCalc();
        updateSendButton();
    }

    function renderNotFoundState(id) {
        scannedVehicle = null;
        carNameEl.innerHTML = `<span class="error-text">❌ Транспорт топилмади</span>`;
        carDetailsEl.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Сканерланган ID</div>
                    <div class="meta-value">${id}</div>
                </div>
            </div>
        `;
        updateCalc();
        updateSendButton();
    }

    function renderNetworkError() {
        scannedVehicle = null;
        carNameEl.innerHTML = `<span class="error-text">⚠️ Тармоқ хатоси</span>`;
        carDetailsEl.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Ҳолат</div>
                    <div class="meta-value">Сервер билан боғланиб бўлмади</div>
                </div>
            </div>
        `;
        updateCalc();
        updateSendButton();
    }

    function getFuelPrice() {
        if (!scannedVehicle || !selectedFuel) return null;

        // 1) Агар Apps Script prices объект юборса
        if (scannedVehicle.prices && typeof scannedVehicle.prices === "object") {
            const p = scannedVehicle.prices[selectedFuel];
            if (p !== undefined && p !== null && p !== "") return Number(p);
        }

        // 2) Агар fuels массив юборса
        if (Array.isArray(scannedVehicle.fuels)) {
            const found = scannedVehicle.fuels.find(x => String(x.name) === String(selectedFuel));
            if (found && found.price !== undefined) return Number(found.price);
        }

        // 3) Агар алоҳида fuel_prices юборса
        if (scannedVehicle.fuel_prices && typeof scannedVehicle.fuel_prices === "object") {
            const p = scannedVehicle.fuel_prices[selectedFuel];
            if (p !== undefined && p !== null && p !== "") return Number(p);
        }

        return null;
    }

    function updateCalc() {
        const liters = Number(litersInput.value || 0);
        const price = getFuelPrice();

        calcFuel.textContent = selectedFuel || "Танланмаган";
        calcLiters.textContent = liters > 0 ? formatLiters(liters) : "0";

        if (price !== null && isFinite(price)) {
            calcPrice.textContent = formatMoney(price);

            if (liters > 0) {
                calcTotal.textContent = formatMoney(price * liters);
            } else {
                calcTotal.textContent = formatMoney(0);
            }
        } else {
            calcPrice.textContent = "Номаълум";
            calcTotal.textContent = liters > 0 ? "Бот ҳисоблайди" : "Номаълум";
        }
    }

    function updateSendButton() {
        const liters = Number(litersInput.value || 0);
        const isReady = !!scannedId && !!selectedFuel && liters > 0;
        sendBtn.disabled = !isReady;

        if (isReady) {
            sendBtn.classList.add("active");
        } else {
            sendBtn.classList.remove("active");
        }
    }

    function selectFuel(fuelName) {
        selectedFuel = fuelName;

        document.querySelectorAll(".fuel-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.fuel === fuelName);
        });

        if (tg.HapticFeedback) {
            tg.HapticFeedback.selectionChanged();
        }

        updateCalc();
        updateSendButton();
    }

    litersInput.addEventListener("input", () => {
        updateCalc();
        updateSendButton();
    });

    const html5QrCode = new Html5Qrcode("reader");
    const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
            if (scannedId === decodedText) return;

            scannedId = decodedText;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred("success");
            }

            setLoadingState();

            fetch(`${SCRIPT_URL}?id=${encodeURIComponent(scannedId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        renderVehicleInfo(data);
                    } else {
                        renderNotFoundState(scannedId);
                    }
                })
                .catch(() => {
                    renderNetworkError();
                });
        },
        () => {}
    );

    function sendData() {
        const liters = Number(litersInput.value || 0);

        if (!scannedId) {
            alert("Аввал QR-кодни сканер қилинг");
            return;
        }

        if (!selectedFuel) {
            alert("Ёқилғи турини танланг");
            return;
        }

        if (!liters || liters <= 0) {
            alert("Литр миқдорини киритинг");
            return;
        }

        tg.sendData(JSON.stringify({
            action: "fuel_done",
            qr_id: scannedId,
            liters: liters,
            fuel_type: selectedFuel
        }));

        tg.close();
    }

    setIdleState();
</script>

</body>
</html>
