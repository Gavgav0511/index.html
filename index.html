<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-АЗС: Сканер</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .info-box { background: #2c2c2c; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        .car-data { color: #4CAF50; font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        .limit-data { color: #aaa; font-size: 0.9em; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; font-size: 1.1em; text-align: center; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; background: #4CAF50; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1em; cursor: pointer; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <h3>Smart-АЗС: Сканер</h3>
    
    <div id="reader"></div>

    <div class="info-box">
        <div id="car-name" class="car-data">Отсканируйте код...</div>
        <div id="car-limit" class="limit-data">ID: —</div>
    </div>

    <input type="number" id="fuel-amount" placeholder="Введите литры" inputmode="decimal">
    <button id="send-btn" disabled>ПОДТВЕРДИТЬ И ОТПРАВИТЬ</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let scannedCarId = null;
    // СЮДА ВСТАВЬ ССЫЛКУ ИЗ GOOGLE APPS SCRIPT
    const SCRIPT_URL = "ТВОЯ_ССЫЛКА_ИЗ_ШАГА_1"; 

    function onScanSuccess(decodedText) {
        scannedCarId = decodedText;
        document.getElementById('car-name').innerText = "Поиск в базе...";
        
        // Запрос данных о машине
        fetch(`${SCRIPT_URL}?id=${scannedCarId}`)
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById('car-name').innerText = `${data.brand} (${data.plate})`;
                    document.getElementById('car-limit').innerText = `Лимит: ${data.limit} л. | ID: ${scannedCarId}`;
                    document.getElementById('send-btn').disabled = false;
                } else {
                    document.getElementById('car-name').innerText = "❌ Машина не найдена";
                    document.getElementById('car-limit').innerText = `ID: ${scannedCarId}`;
                    document.getElementById('send-btn').disabled = true;
                }
            })
            .catch(err => {
                alert("Ошибка связи с таблицей");
                console.error(err);
            });
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(onScanSuccess);

    document.getElementById('send-btn').addEventListener('click', () => {
        const amount = document.getElementById('fuel-amount').value;
        if (!amount || amount <= 0) {
            alert("Введите корректное количество литров");
            return;
        }

        const result = {
            action: "fuel_done",
            amount: amount,
            qr_id: scannedCarId
        };

        tg.sendData(JSON.stringify(result));
        tg.close();
    });
</script>

</body>
</html>
