<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart-АЗС Сканер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 15px; }
        .card { background: #1c1c1e; border-radius: 15px; padding: 20px; margin-top: 15px; text-align: left; display: none; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 20px; background: #fff; color: #000; box-sizing: border-box; }
        .btn-confirm { background: #34c759; color: #fff; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; border: none; font-size: 18px; cursor: pointer; }
        .btn-scan { background: #007aff; color: #fff; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; border: none; margin-bottom: 10px; cursor: pointer; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #333; }
        .label { color: #8e8e93; font-size: 12px; margin-top: 10px; }
        .value { font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #007aff; }
    </style>
</head>
<body>
    <h3>Smart-АЗС: Сканер</h3>
    
    <div id="reader"></div>
    <button id="scan_btn" class="btn-scan" onclick="startScan()">🔍 СКАНИРОВАТЬ QR</button>
    
    <div id="car_card" class="card">
        <div class="label">ОТСКАНИРОВАННЫЙ КОД:</div>
        <div id="display_id" class="value">---</div>
        
        <div class="label">ВВЕДИТЕ ЛИТРЫ:</div>
        <input type="number" id="fuel_amount" placeholder="0.00" inputmode="decimal">
        
        <button class="btn-confirm" onclick="sendData()">ПОДТВЕРДИТЬ И ОТПРАВИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let scannedId = "";

        // Создаем объект сканера
        const html5QrCode = new Html5Qrcode("reader");

        function startScan() {
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    // УСПЕХ: Мы получили текст из QR (например "10001")
                    scannedId = decodedText;
                    
                    // Выводим ID на экран
                    document.getElementById('display_id').innerText = scannedId;
                    
                    // Показываем карточку ввода и прячем кнопку сканирования
                    document.getElementById('car_card').style.display = "block";
                    document.getElementById('scan_btn').style.display = "none";
                    
                    // Останавливаем камеру
                    html5QrCode.stop().catch(err => console.error(err));
                }
            ).catch(err => {
                alert("Ошибка камеры: " + err);
            });
        }

        function sendData() {
            const amount = document.getElementById('fuel_amount').value;
            if (!amount || amount <= 0) {
                alert("Введите количество литров!");
                return;
            }

            // Отправляем данные в Python-бот
            const data = {
                action: "fuel_done",
                amount: amount,
                qr_id: scannedId
            };
            
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
