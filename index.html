<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #000000); 
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: var(--tg-theme-button-color, #248bed); 
            color: var(--tg-theme-button-text-color, #ffffff); 
            border: none; 
            border-radius: 12px;
            margin-top: 50px;
            font-weight: bold;
        }
        #result { 
            margin-top: 30px; 
            padding: 15px;
            border-radius: 10px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            word-break: break-all; 
        }
    </style>
</head>
<body>
    <h2>QR Сканер</h2>
    <p>Нажмите кнопку ниже, чтобы считать код</p>
    <button id="scan-btn">Открыть камеру</button>
    <div id="result">Здесь будет результат</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем приложение на весь экран

        const btn = document.getElementById('scan-btn');
        const resultDiv = document.getElementById('result');

        btn.addEventListener('click', () => {
            tg.showScanQrPopup({
                text: "Наведите камеру на QR-код"
            }, (data) => {
                resultDiv.innerText = "Успешно! Содержимое: " + data;
                tg.closeScanQrPopup(); 
                return true; 
            });
        });
    </script>
</body>
</html>
