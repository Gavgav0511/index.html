<!DOCTYPE html>
<html lang="uz-Cyrl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart-AZS Сканер</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --brand: #4a0efd;
            --brand-soft: rgba(74, 14, 253, 0.18);
            --bg: #0b0b12;
            --card: #151522;
            --card-2: #1c1c2c;
            --text: #ffffff;
            --muted: #a6a6b3;
            --border: #2c2c3d;
            --success: #32d74b;
            --danger: #ff453a;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(74,14,253,0.22), transparent 35%),
                linear-gradient(180deg, #090910 0%, #0f0f18 100%);
            color: var(--text);
            margin: 0;
            padding: 14px;
            overflow-x: hidden;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--brand);
            box-shadow: 0 0 16px rgba(74, 14, 253, 0.8);
        }

        .topbar-title {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .app-card {
            background: linear-gradient(180deg, var(--card) 0%, var(--card-2) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
        }

        .scanner-title {
            font-size: 0.92rem;
            color: var(--muted);
            margin-bottom: 10px;
            text-align: center;
        }

        #reader {
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
            background: #000;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* html5-qrcode ортиқча элементларини яшириш */
        #reader__dashboard,
        #reader span,
        #reader button {
            display: none !important;
        }

        #reader__camera_selection {
            display: none !important;
        }

        .status-panel {
            margin-top: 16px;
            min-height: 118px;
            text-align: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 14px 12px;
        }

        #car-name {
            font-size: 1rem;
            color: var(--muted);
        }

        .car-info {
            color: var(--success);
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.15;
            margin-bottom: 4px;
        }

        .plate-info {
            font-size: 0.98rem;
            color: #e6e6ef;
            margin-bottom: 10px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
            margin-top: 8px;
        }

        .meta-item {
            background: rgba(74, 14, 253, 0.08);
            border: 1px solid rgba(74, 14, 253, 0.2);
            border-radius: 14px;
            padding: 10px 12px;
            text-align: left;
        }

        .meta-label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .meta-value {
            font-size: 0.98rem;
            font-weight: 700;
            color: #fff;
            word-break: break-word;
        }

        .limit-unlimited {
            color: var(--success);
        }

        .limit-limited {
            color: #fff;
        }

        .input-wrap {
            margin-top: 16px;
        }

        input {
            width: 100%;
            background: #11111c;
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white;
            padding: 16px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            transition: 0.2s ease;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px var(--brand-soft);
        }

        #send-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--brand) 0%, #6a35ff 100%);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 17px;
            font-size: 1rem;
            font-weight: 800;
            margin-top: 14px;
            transition: 0.25s ease;
            opacity: 0.35;
            transform: scale(1);
            box-shadow: 0 10px 24px rgba(74, 14, 253, 0.28);
        }

        #send-btn.active {
            opacity: 1;
            transform: scale(1.01);
        }

        #send-btn:disabled {
            cursor: not-allowed;
        }

        .hint {
            margin-top: 12px;
            text-align: center;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .brand-footer {
            margin-top: 14px;
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.76rem;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo-dot"></div>
        <div class="topbar-title">Smart-AZS Сканер</div>
    </div>

    <div class="app-card">
        <div class="scanner-title">QR-кодни камерага тўғри тутинг</div>

        <div id="reader"></div>

        <div class="status-panel">
            <div id="car-name">QR-кодни сканер қилинг</div>
            <div id="car-details"></div>
        </div>

        <div class="input-wrap">
            <input
                type="number"
                id="fuel-amount"
                placeholder="Неча литр?"
                inputmode="decimal"
                min="0"
                step="0.1"
            >
            <button id="send-btn" onclick="sendData()" disabled>ТАСДИҚЛАШ</button>
        </div>

        <div class="hint">Аввал транспортни сканер қилинг, кейин литр миқдорини киритинг.</div>
        <div class="brand-footer">Powered by Smart-AZS</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    let scannedId = null;

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwwS5q_LFILHpkfrwFer7fDSucoefrJaKhPJXLxYDk6lGBY-B25aNIZfX7fspiMhkon/exec";

    const carNameEl = document.getElementById("car-name");
    const carDetailsEl = document.getElementById("car-details");
    const sendBtn = document.getElementById("send-btn");
    const fuelInput = document.getElementById("fuel-amount");

    function setIdleState() {
        carNameEl.innerText = "QR-кодни сканер қилинг";
        carDetailsEl.innerHTML = "";
        sendBtn.disabled = true;
        sendBtn.classList.remove("active");
    }

    function setLoadingState() {
        carNameEl.innerText = "⚡ Текширилмоқда...";
        carDetailsEl.innerHTML = "";
        sendBtn.disabled = true;
        sendBtn.classList.remove("active");
    }

    function formatLimit(limitValue) {
        if (
            limitValue === undefined ||
            limitValue === null ||
            String(limitValue).trim() === ""
        ) {
            return `<span class="limit-limited">Номаълум</span>`;
        }

        const raw = String(limitValue).trim().toLowerCase();

        if (raw === "unlimited" || raw === "чексиз") {
            return `<span class="limit-unlimited">Чексиз</span>`;
        }

        return `<span class="limit-limited">${limitValue} л</span>`;
    }

    function renderVehicleInfo(data) {
        const brand = data.brand || "Транспорт";
        const plate = data.plate || data.number || "Рақам кўрсатилмаган";
        const company = data.company || data.company_name || "Кўрсатилмаган";
        const limitHtml = formatLimit(data.limit);

        carNameEl.innerHTML = `
            <div class="car-info">${brand}</div>
            <div class="plate-info">${plate}</div>
        `;

        carDetailsEl.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Лимит</div>
                    <div class="meta-value">${limitHtml}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Фирма</div>
                    <div class="meta-value">${company}</div>
                </div>
            </div>
        `;

        sendBtn.disabled = false;
        sendBtn.classList.add("active");
    }

    function renderNotFoundState(id) {
        carNameEl.innerText = "❌ Транспорт топилмади";
        carDetailsEl.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Сканерланган ID</div>
                    <div class="meta-value">${id}</div>
                </div>
            </div>
        `;
        sendBtn.disabled = true;
        sendBtn.classList.remove("active");
    }

    function renderNetworkError() {
        carNameEl.innerText = "⚠️ Тармоқ хатоси";
        carDetailsEl.innerHTML = `
            <div class="meta-grid">
                <div class="meta-item">
                    <div class="meta-label">Ҳолат</div>
                    <div class="meta-value">Сервер билан боғланиб бўлмади</div>
                </div>
            </div>
        `;
        sendBtn.disabled = true;
        sendBtn.classList.remove("active");
    }

    const html5QrCode = new Html5Qrcode("reader");
    const config = {
        fps: 10,
        qrbox: { width: 250, height: 250 }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
            if (scannedId === decodedText) return;

            scannedId = decodedText;

            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred("success");
            }

            setLoadingState();

            fetch(`${SCRIPT_URL}?id=${encodeURIComponent(scannedId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        renderVehicleInfo(data);
                    } else {
                        renderNotFoundState(scannedId);
                    }
                })
                .catch(() => {
                    renderNetworkError();
                });
        },
        () => {}
    );

    function sendData() {
        const amt = parseFloat(fuelInput.value);

        if (!scannedId) {
            alert("Аввал QR-кодни сканер қилинг");
            return;
        }

        if (!amt || amt <= 0) {
            alert("Литр миқдорини киритинг");
            return;
        }

        tg.sendData(JSON.stringify({
            action: "fuel_done",
            amount: amt,
            qr_id: scannedId
        }));

        tg.close();
    }

    setIdleState();
</script>

</body>
</html>
